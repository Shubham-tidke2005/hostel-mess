{% extends "base.html" %}

{% block content %}
<style>
    .register-container{

    width:90%;
    max-width:600px;

    margin:60px auto;

    padding:40px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.1);

    border-radius:25px;

    backdrop-filter:blur(20px);

    box-shadow:
    0 0 25px rgba(138,43,226,.15);
}

.register-container h2{

    text-align:center;

    margin-bottom:30px;

    color:white;

    font-size:2rem;
}

.register-container form p{

    margin-bottom:18px;
}

.register-container label{

    display:block;

    margin-bottom:8px;

    color:#A0A0CB;

    font-weight:500;
}

.register-container input{

    width:100%;

    padding:14px;

    border-radius:12px;

    border:1px solid rgba(255,255,255,.1);

    background:rgba(255,255,255,.08);

    color:white;

    font-size:15px;

    outline:none;

    transition:.3s;
}

.register-container input:focus{

    border-color:#8A2BE2;

    box-shadow:
    0 0 15px rgba(138,43,226,.3);
}

.register-container button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:50px;

    cursor:pointer;

    font-weight:600;

    color:white;

    background:
    linear-gradient(
        135deg,
        #8A2BE2,
        #00FFFF
    );

    transition:.3s;
}

.register-container button:hover{

    transform:translateY(-3px);

    box-shadow:
    0 0 20px #8A2BE2;
}

.errorlist{

    color:#ff6b6b;

    list-style:none;

    margin-top:5px;
}

@media(max-width:768px){

    .register-container{

        width:95%;

        padding:25px;
    }
}
</style>

<div class="register-container">

    <h2>Register</h2>

    <form method="POST">

        {% csrf_token %}

        {% for field in form %}
        <p>
        {{ field.label_tag }}
        {{ field }}
        {{ field.errors }}
        </p>
        {% endfor %}

        <button type="submit">
            Register
        </button>

    </form>

</div>

{% endblock %}
