<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    /* ==========================
       ROOT VARIABLES
    ========================== */
    :root{
        --bg-primary:#0A0A1E;
        --bg-secondary:#161632;

        --accent-primary:#8A2BE2;
        --accent-secondary:#00FFFF;

        --text-primary:#FFFFFF;
        --text-secondary:#A0A0CB;

        --glass-bg:rgba(255,255,255,0.05);
        --glass-border:rgba(255,255,255,0.12);
    }

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    html{
        scroll-behavior:smooth;
    }

    body{
        font-family:'Poppins',sans-serif;
        background:
        radial-gradient(circle at top right,
        rgba(138,43,226,0.25),
        transparent 30%),

        radial-gradient(circle at bottom left,
        rgba(0,255,255,0.15),
        transparent 35%),

        var(--bg-primary);

        color:var(--text-primary);
        overflow-x:hidden;
    }

    /* ==========================
       CUSTOM SCROLLBAR
    ========================== */

    ::-webkit-scrollbar{
        width:10px;
    }

    ::-webkit-scrollbar-track{
        background:#111126;
    }

    ::-webkit-scrollbar-thumb{
        background:linear-gradient(
            var(--accent-primary),
            var(--accent-secondary)
        );
        border-radius:20px;
    }

    /* ==========================
       NAVBAR
    ========================== */

    .navbar{
        position:sticky;
        top:0;
        z-index:1000;

        backdrop-filter:blur(18px);

        background:rgba(10,10,30,0.65);

        border-bottom:1px solid rgba(255,255,255,0.08);

        padding:18px 8%;
    }

    .nav-container{
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .logo{
        font-size:1.7rem;
        font-weight:700;
        color:white;

        text-shadow:
        0 0 15px var(--accent-primary),
        0 0 30px var(--accent-primary);
    }

    .nav-links{
        display:flex;
        gap:35px;
        list-style:none;
    }

    .nav-links a{
        text-decoration:none;
        color:white;
        position:relative;
        transition:.3s;
    }

    .nav-links a::after{
        content:'';
        position:absolute;
        left:50%;
        bottom:-6px;

        width:0;
        height:2px;

        background:var(--accent-secondary);

        transform:translateX(-50%);
        transition:.4s;
    }

    .nav-links a:hover::after{
        width:100%;
    }

    .nav-links a:hover{
        color:var(--accent-secondary);
    }

    /* ==========================
       BUTTONS
    ========================== */

    .btn{
        padding:12px 28px;
        border:none;
        border-radius:50px;
        cursor:pointer;
        font-weight:600;

        color:white;

        background:
        linear-gradient(
        135deg,
        var(--accent-primary),
        var(--accent-secondary)
        );

        transition:.4s ease;

        box-shadow:
        0 0 20px rgba(138,43,226,.35);

        text-decoration:none;
    }

    .btn:hover{
        transform:translateY(-4px) scale(1.03);

        box-shadow:
        0 0 20px var(--accent-primary),
        0 0 40px var(--accent-primary),
        0 0 80px var(--accent-secondary);
    }

    /* ==========================
       HERO SECTION
    ========================== */

    .hero{
        min-height:90vh;

        display:grid;
        grid-template-columns:1fr 1fr;

        align-items:center;
        gap:50px;

        padding:70px 8%;
    }

    .hero-content{
        animation:fadeIn 1s ease forwards;
    }

    .hero-content h1{
        font-size:4rem;
        line-height:1.2;

        text-shadow:
        0 0 15px rgba(138,43,226,.8);
    }

    .hero-content p{
        margin:25px 0;
        color:var(--text-secondary);
        line-height:1.8;
    }

    .hero-image{
        display:flex;
        justify-content:center;
    }

    .floating-card{
        width:350px;
        height:350px;

        border-radius:30px;

        background:var(--glass-bg);

        backdrop-filter:blur(25px);

        border:1px solid var(--glass-border);

        animation:float 5s ease-in-out infinite;

        box-shadow:
        0 0 30px rgba(138,43,226,.35);
    }

    /* ==========================
       FEATURES
    ========================== */

    .features{
        padding:100px 8%;
    }

    .section-title{
        text-align:center;
        margin-bottom:60px;

        font-size:2.5rem;

        text-shadow:
        0 0 15px var(--accent-primary);
    }

    .feature-grid{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:30px;
    }

    .feature-card{
        background:var(--glass-bg);

        backdrop-filter:blur(15px);

        border:1px solid var(--glass-border);

        border-radius:24px;

        padding:35px;

        transition:.4s ease;

        will-change:transform;
    }

    .feature-card:hover{
        transform:
        translateY(-10px)
        scale(1.02);

        border-color:var(--accent-primary);

        box-shadow:
        0 0 30px rgba(138,43,226,.4);
    }

    .feature-card h3{
        margin-bottom:15px;
    }

    .feature-card p{
        color:var(--text-secondary);
    }

    /* ==========================
       NEWSLETTER
    ========================== */

    .newsletter{
        padding:100px 8%;
    }

    .newsletter-box{
        text-align:center;

        padding:60px;

        background:var(--glass-bg);

        border:1px solid var(--glass-border);

        border-radius:30px;

        backdrop-filter:blur(15px);
    }

    .newsletter-box p{
        color:var(--text-secondary);
        margin:20px 0;
    }

    .newsletter-box input{
        width:100%;
        max-width:450px;

        padding:15px;

        border:none;
        outline:none;

        border-radius:50px;

        background:#1b1b3b;
        color:white;
    }

    /* ==========================
       FOOTER
    ========================== */

    footer{
        text-align:center;
        padding:30px;
        color:var(--text-secondary);
    }

    /* ==========================
       ANIMATIONS
    ========================== */

    @keyframes float{
        0%,100%{
            transform:translateY(0);
        }
        50%{
            transform:translateY(-20px);
        }
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform:translateY(30px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    /* ==========================
       RESPONSIVE
    ========================== */

    @media(max-width:992px){

        .hero{
            grid-template-columns:1fr;
            text-align:center;
        }

        .feature-grid{
            grid-template-columns:repeat(2,1fr);
        }
    }

    @media(max-width:768px){

        .nav-links{
            display:none;
        }

        .hero-content h1{
            font-size:2.6rem;
        }

        .feature-grid{
            grid-template-columns:1fr;
        }

        .floating-card{
            width:280px;
            height:280px;
        }
    }
</style>
```
