{% extends "base.html" %}

{% block content %}

<style>

.login-container{

    width:90%;
    max-width:500px;

    margin:80px auto;

    padding:40px;

    background:rgba(255,255,255,.05);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.1);

    border-radius:25px;

    box-shadow:
    0 0 20px rgba(138,43,226,.2),
    0 0 40px rgba(138,43,226,.1);

    animation:fadeIn .8s ease;
}

.login-container h2{

    text-align:center;

    margin-bottom:30px;

    font-size:2rem;

    color:white;

    text-shadow:
    0 0 10px rgba(138,43,226,.8);
}

.login-form{

    display:flex;

    flex-direction:column;

    gap:18px;
}

.login-form input{

    width:100%;

    padding:14px 16px;

    border-radius:12px;

    border:1px solid rgba(255,255,255,.1);

    background:rgba(255,255,255,.05);

    color:white;

    font-size:15px;

    outline:none;

    transition:.3s;
}

.login-form input::placeholder{

    color:#A0A0CB;
}

.login-form input:focus{

    border-color:#8A2BE2;

    box-shadow:
    0 0 15px rgba(138,43,226,.4);

    background:rgba(255,255,255,.08);
}

.login-form button{

    padding:14px;

    border:none;

    border-radius:50px;

    cursor:pointer;

    font-size:1rem;

    font-weight:600;

    color:white;

    background:
    linear-gradient(
        135deg,
        #8A2BE2,
        #00FFFF
    );

    transition:.4s ease;

    box-shadow:
    0 0 20px rgba(138,43,226,.3);
}

.login-form button:hover{

    transform:
    translateY(-3px)
    scale(1.02);

    box-shadow:
    0 0 20px #8A2BE2,
    0 0 40px #8A2BE2,
    0 0 60px #00FFFF;
}

.login-footer{

    text-align:center;

    margin-top:20px;

    color:#A0A0CB;
}

.login-footer a{

    color:#00FFFF;

    text-decoration:none;

    font-weight:600;
}

.login-footer a:hover{

    text-shadow:
    0 0 10px #00FFFF;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

    .login-container{

        width:95%;

        padding:25px;

        margin:50px auto;
    }

    .login-container h2{
        font-size:1.7rem;
    }
}

</style>

<div class="login-container">

    <h2>Login</h2>

    <form method="POST" class="login-form">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <div class="login-footer">
        Don't have an account?
        <a href="{% url 'register' %}">
            Register
        </a>
    </div>

</div>

{% endblock %}
